services:
  database:
    image: postgres:16
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    depends_on:
      database:
        condition: service_healthy
    build:
      context: .
      dockerfile: backend-preguntas/Dockerfile
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./backend-preguntas:/backend
      - /backend/node_modules
    ports:
      - "3002:3000"
    networks:
      - backend-network
      - frontend-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    depends_on:
      backend:
        condition: service_healthy
    build:
      context: .
      dockerfile: frontend-preguntas/Dockerfile
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./frontend-preguntas:/frontend
    ports:
      - "3003:3003"
    networks:
      - frontend-network

networks:
  backend-network:
    driver: bridge
  frontend-network:
    driver: bridge

volumes:
  postgres_data:
